<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache">
    <title>训练状态</title>
    <style>
        body { font-family: Arial; background: #1a1a2e; color: #fff; padding: 40px; }
        .big { font-size: 48px; font-weight: bold; color: #4fc3f7; }
        .label { color: #78909c; font-size: 14px; }
        .row { margin: 20px 0; }
        .red { color: #f44336; }
        .blue { color: #2196f3; }
    </style>
</head>
<body>
    <h1>自我博弈训练</h1>
    <div class="row">
        <div class="label">进度</div>
        <div class="big" id="progress">加载中...</div>
    </div>
    <div class="row">
        <span class="red" id="red">-</span> vs <span class="blue" id="blue">-</span>
    </div>
    <script>
        fetch('/api/training-status')
            .then(r => r.json())
            .then(d => {
                document.getElementById('progress').textContent = 
                    d.episode.toLocaleString() + ' / ' + d.target.toLocaleString();
                document.getElementById('red').textContent = 
                    '红队 ' + d.red_win_rate.toFixed(1) + '%';
                document.getElementById('blue').textContent = 
                    '蓝队 ' + d.blue_win_rate.toFixed(1) + '%';
            });
    </script>
</body>
</html>
