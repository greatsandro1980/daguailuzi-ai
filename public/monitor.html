<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI训练监控 - 自我博弈</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
            color: #4fc3f7;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .card h2 {
            font-size: 18px;
            margin-bottom: 16px;
            color: #81d4fa;
        }
        
        .progress-bar {
            height: 24px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4fc3f7 0%, #00bcd4 100%);
            border-radius: 12px;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }
        
        .stat-item {
            text-align: center;
            padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #4fc3f7;
            margin-bottom: 4px;
        }
        
        .stat-label {
            font-size: 14px;
            color: #90a4ae;
        }
        
        .team-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 16px;
        }
        
        .team-card {
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        
        .team-red {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid rgba(244, 67, 54, 0.3);
        }
        
        .team-blue {
            background: rgba(33, 150, 243, 0.2);
            border: 1px solid rgba(33, 150, 243, 0.3);
        }
        
        .team-name {
            font-size: 16px;
            margin-bottom: 8px;
        }
        
        .team-win-rate {
            font-size: 42px;
            font-weight: bold;
        }
        
        .team-red .team-win-rate {
            color: #f44336;
        }
        
        .team-blue .team-win-rate {
            color: #2196f3;
        }
        
        .status-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 16px;
        }
        
        .status-running {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
        }
        
        .status-stopped {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
        }
        
        .training-type {
            text-align: center;
            margin-bottom: 20px;
            padding: 12px;
            background: rgba(156, 39, 176, 0.2);
            border-radius: 12px;
            border: 1px solid rgba(156, 39, 176, 0.3);
        }
        
        .training-type-label {
            font-size: 14px;
            color: #ce93d8;
        }
        
        .training-type-value {
            font-size: 20px;
            font-weight: bold;
            color: #e1bee7;
            margin-top: 4px;
        }
        
        .refresh-info {
            text-align: center;
            color: #607d8b;
            font-size: 12px;
            margin-top: 20px;
        }
        
        .error-msg {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid rgba(244, 67, 54, 0.3);
            color: #f44336;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 AI 训练监控</h1>
        
        <div class="training-type">
            <div class="training-type-label">训练模式</div>
            <div class="training-type-value" id="trainingType">加载中...</div>
        </div>
        
        <div class="card">
            <span class="status-badge status-running" id="statusBadge">运行中</span>
            <h2>训练进度</h2>
            <div class="progress-bar">
                <div class="progress-fill" id="progressBar" style="width: 0%">0%</div>
            </div>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-value" id="episode">-</div>
                    <div class="stat-label">已完成局数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="target">500,000</div>
                    <div class="stat-label">目标局数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="speed">-</div>
                    <div class="stat-label">速度 (局/秒)</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="elapsed">-</div>
                    <div class="stat-label">已用时间</div>
                </div>
            </div>
        </div>
        
        <div class="card">
            <h2>队伍胜率对比</h2>
            <div class="team-stats">
                <div class="team-card team-red">
                    <div class="team-name">🔴 红队</div>
                    <div class="team-win-rate" id="redWinRate">-</div>
                    <div class="stat-label">胜率</div>
                </div>
                <div class="team-card team-blue">
                    <div class="team-name">🔵 蓝队</div>
                    <div class="team-win-rate" id="blueWinRate">-</div>
                    <div class="stat-label">胜率</div>
                </div>
            </div>
        </div>
        
        <div class="card">
            <h2>训练参数</h2>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-value" id="avgLoss">-</div>
                    <div class="stat-label">平均损失</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="timestamp">-</div>
                    <div class="stat-label">最后更新</div>
                </div>
            </div>
        </div>
        
        <div class="refresh-info">
            页面每 5 秒自动刷新
        </div>
    </div>
    
    <script>
        let lastEpisode = 0;
        
        function formatNumber(num) {
            if (typeof num !== 'number') return '-';
            return num.toLocaleString();
        }
        
        function formatTime(hours) {
            if (typeof hours !== 'number') return '-';
            const h = Math.floor(hours);
            const m = Math.floor((hours - h) * 60);
            return `${h}h ${m}m`;
        }
        
        function extractTime(isoString) {
            if (!isoString) return '-';
            try {
                const date = new Date(isoString);
                return date.toLocaleTimeString('zh-CN');
            } catch {
                return '-';
            }
        }
        
        async function fetchStatus() {
            try {
                const response = await fetch('/api/training-status');
                const data = await response.json();
                
                // 训练类型
                const trainingType = data.training_type || 'imitation';
                document.getElementById('trainingType').textContent = 
                    trainingType === 'self_play' ? '🤖 自我博弈训练' : '📚 模仿学习训练';
                
                // 状态
                const badge = document.getElementById('statusBadge');
                const speed = data.speed || 0;
                const isRunning = speed > 0 || Date.now() - new Date(data.timestamp).getTime() < 60000;
                
                badge.textContent = isRunning ? '运行中' : '已停止';
                badge.className = 'status-badge ' + (isRunning ? 'status-running' : 'status-stopped');
                
                // 进度
                const episode = data.episode || 0;
                const target = data.target || 500000;
                const progress = (episode / target * 100).toFixed(1);
                
                document.getElementById('progressBar').style.width = progress + '%';
                document.getElementById('progressBar').textContent = progress + '%';
                document.getElementById('episode').textContent = formatNumber(episode);
                document.getElementById('target').textContent = formatNumber(target);
                
                // 速度和时间
                document.getElementById('speed').textContent = Math.round(speed || 0);
                document.getElementById('elapsed').textContent = formatTime(data.elapsed_hours);
                
                // 胜率（根据训练类型显示）
                if (trainingType === 'self_play') {
                    document.getElementById('redWinRate').textContent = 
                        (data.red_win_rate || 0).toFixed(1) + '%';
                    document.getElementById('blueWinRate').textContent = 
                        (data.blue_win_rate || 0).toFixed(1) + '%';
                } else {
                    document.getElementById('redWinRate').textContent = 
                        (data.total_win_rate || 0).toFixed(1) + '%';
                    document.getElementById('blueWinRate').textContent = '-';
                }
                
                // 损失
                document.getElementById('avgLoss').textContent = 
                    typeof data.avg_loss === 'number' ? data.avg_loss.toFixed(4) : '-';
                
                // 时间戳
                document.getElementById('timestamp').textContent = extractTime(data.timestamp);
                
                // 检查是否需要切换训练类型
                if (lastEpisode > 0 && episode >= lastEpisode && episode >= 200000 && trainingType === 'imitation') {
                    console.log('模仿学习训练完成，等待自我博弈启动...');
                }
                lastEpisode = episode;
                
            } catch (error) {
                console.error('获取状态失败:', error);
            }
        }
        
        // 初始加载
        fetchStatus();
        
        // 每5秒刷新
        setInterval(fetchStatus, 5000);
    </script>
</body>
</html>
